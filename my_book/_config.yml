#######################################################################################
# A default configuration that will be loaded for all jupyter books
# See the documentation for help and more options: 
# https://jupyterbook.org/customize/config.html

#######################################################################################
# Book settings
title                       : my-book  # The title of the book. Will be placed in the left navbar.
author                      : indexxlim  # The author of the book
copyright                   : "2021"  # Copyright year to be placed in the footer
logo                        : logo.png  # A path to the book logo


html:
  favicon: header_image.jpg
  use_repository_button: true
  use_issues_button: true
  use_edit_page_button: true
  extra_navbar: Powered by <a href="https://jupyterbook.org">Jupyter Book</a>
  home_page_in_navbar: true
  comments:
    hypothesis: true
    utterances:
      repo: "indexxlim/indexxlim.github.io"

execute:
  execute_notebooks: 'off'

latex:
  latex_engine: pdflatex

parse:
  myst_extended_syntax: true
  myst_url_schemes: [mailto, http, https]

launch_buttons:
  notebook_interface: jupyterlab
  binderhub_url: https://mybinder.org
  colab_url: https://colab.research.google.com
  thebe: true

repository:
  url: https://github.com/indexxlim/indexxlim.github.io
  branch: master
  path_to_book: blog


sphinx:
  config:
    show_authors: false
    html_show_copyright: false